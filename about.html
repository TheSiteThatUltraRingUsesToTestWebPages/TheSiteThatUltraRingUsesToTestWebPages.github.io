<script>
	window.addEventListener('pageshow', function (event) {
		if (event.persisted || window.performance && window.performance.navigation.type === 2) {
			window.location.reload();
		}
	});

	let scrolled = 0;
	const sidebarFrame = document.querySelector(".fixed-sidebar-frame");
	
	function autoScroll() {
		scrolled += 1;
		const slowerScroll = scrolled * 0.5;
	
		sidebarFrame.style.backgroundPosition = `
			right ${scrolled}px, 
			left ${scrolled}px, 
			right 48px top ${slowerScroll}px, 
			left 48px top ${slowerScroll}px
		`;
		
		window.requestAnimationFrame(autoScroll);
	}
	autoScroll();
</script>
